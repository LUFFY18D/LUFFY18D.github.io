<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      body{
        margin:0;
        padding:0;
      }
      .back{
        width:100vw;
        height:100vh;
      }
      .bg{
        width:100vw;
        height:100vh;
        position:absolute;
        top:0px;
        left:0px;
        background-image:url(b.jpg);
        background-size:cover;
        z-index:-1;
        filter:blur(10px);
      }
      .a{
        width:100vw;
        height:700px;
      }
      .aa{
        width:100vw;
        height:150px;
      }
      .a0{
        height:100px;
        width:100vw;
        float:left;
        text-align:center;
      }
      .a1{
        width:100vw;
        text-align:center;
        padding-top:50px;
      }
      .a11{
        width:500px;
        height:260px;
        border:1px solid black;
        border-radius:5px;
        margin:0 auto;
        border-color: white;
        box-shadow:0px 0px 5px 1px grey;
        padding-top:100px;
        font-family:"微软雅黑";
        font-size:24px;
      }
      .img-title{
        width:100px;
        height:100px;
        border-radius:50px;
        box-shadow:0px 0px 5px 1px grey;
      }
      .wrap{
        width:100%;
        height:70px;
      }
      .input-label{
        float:left;
        height:70px;
        width:40%;
        text-align:right;
        line-height:70px;
        background-color:rgba(200,200,200,0.6);
        /* border-bottom:1px solid grey; */
      }
      .input-wrap{
        float:left;
        width:60%;
        height:70px;
        text-align:left;
        margin:0;
        padding:0;
        /* border-top:1px solid grey; */
      }
      .btn{
        float:left;
        height:90px;
        width:50%;
        line-height:90px;
      }
      .in{
        width:100%;
        height:70px;
        border:0;
        padding:0;
        background-color:rgba(255,255,255,0.7);
        font-size:24px;
      }
      .in:hover{
        box-shadow:inset 0px 0px 3px 1px grey;
      }
      .button{
        width:80px;
        height:55px;
        background-color:rgba(0,100,255,0.2);
        font-size:24px;
        border:0;
        margin-top:30px;
      }
      .button:hover{
        box-shadow: 0px 0px 3px 1px grey;
      }
      hr{
        margin:0;
        padding:0;
      }
    </style>
  </head>
  <body>
    <div class="back">
      <div class="bg">

      </div>
      <div class="a">
        <div class="aa">

        </div>
        <div class="a0">
          <img src="a.jpg" alt="" class="img-title">
        </div>
        <div class="a1">
          <div class="a11">
            <div class="wrap">
              <div class="input-label">
                用户名：
              </div>
              <div class="input-wrap">
                <input type="text" name="" value="" class="in" placeholder="&#12288;请输入用户名">
              </div>
            </div>
            <hr>
            <div class="wrap">
              <div class="input-label">
                密&#12288;码：
              </div>
              <div class="input-wrap">
                <input type="password" name="" value="" class="in" placeholder="&#12288;请输入密码">
              </div>
            </div>
            <div class="wrap">
              <div class="btn">
                <button type="button" name="button" class="button">登录</button>
              </div>
              <div class="btn">
                <button type="button" name="button" class="button">注册</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
